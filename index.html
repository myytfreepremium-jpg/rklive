    <style>
        /* Professional CSS Variables */
        :root {
            --primary: #d32f2f; 
            --primary-hover: #b71c1c;
            --bg-dark: #0f172a; 
            --card-bg: #1e293b;
            --border-color: #334155;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --header-bg: #0f172a;
            --footer-bg: #020617;

            --brand-gradient: linear-gradient(to right, #ff3366, #ff7733);
        }

        /* Light Theme Variables */
        body.light-theme {
            --bg-dark: #f1f5f9;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-light: #0f172a;
            --text-muted: #475569;
            --header-bg: #ffffff;
            --footer-bg: #e2e8f0;

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ================= 2-LINE HEADER ================= */
        header {
            background: var(--header-bg); 
            display: flex; 
            flex-direction: column;
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: var(--shadow);
            transition: background 0.2s;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;

        .header-sub {

            align-items: center;

        .panel-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-light); transition: 0.2s ease;

        .search-box { width: 100%; max-width: 280px; padding: 9px 15px; font-size: 14px; outline: none; }

        .matches-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        
        .match-card {

            border: 1px solid var(--border-color); position: relative; overflow: hidden;

        /* Boxed Countdown Timer */
        .countdown-timer-box {

            background: rgba(217, 119, 6, 0.1);
            border-color: rgba(217, 119, 6, 0.4);
            color: #d97706;

        .match-category { font-size: 12px; text-transform: uppercase; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; }
        .match-title { font-size: 16px; font-weight: 700; color: var(--text-light); line-height: 1.4; }
        .match-date { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        .btn-modern {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.2s ease; margin-top: auto; width: 100%;

        .btn-modern:hover:not([disabled]) { background: var(--primary-hover); }

        .modal-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-dark); }
        .modal-header h3 { font-size: 15px; font-weight: 600; color: var(--text-light); }
        
        #stream-options-container { padding: 15px; overflow-y: auto; flex: 1; }
        
        .stream-option { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; text-align: left; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .stream-option:hover { border-color: var(--primary); color: var(--primary); }
        .hd-badge { background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 10px; float: right; font-weight: 700; }
        .loader { text-align: center; padding: 40px; font-size: 14px; width: 100%; color: var(--text-muted); }

        /* ================= ABOUT PAGE ================= */
        #about-page { display: none; padding: 40px 4%; max-width: 900px; margin: 0 auto; flex: 1; }
        .about-box { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); }
        
        /* ================= FOOTER ================= */
        footer { background: var(--footer-bg); padding: 25px 4%; border-top: 1px solid var(--border-color); margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .footer-btn { background: transparent; color: var(--text-muted); border: none; font-size: 14px; cursor: pointer; }
        .footer-btn:hover { color: var(--primary); text-decoration: underline; }
        .copyright { color: var(--text-muted); font-size: 12px; text-align: center; }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .header-main { height: 55px; padding: 0 4%; }
            .header-sub { height: 45px; padding: 0 4%; }
            #player-wrapper { top: 100px; padding: 10px 4%; } 
            
            .logo { font-size: 20px; }
            .search-box { min-width: 120px; width: 150px; padding: 8px 10px; font-size: 12px; }
            .theme-btn { font-size: 14px; padding: 0 8px; height: 32px;}
            
            .category-wrapper { padding: 0 5px; height: 32px; }

            .header-btn { padding: 0 10px; height: 32px; font-size: 12px; }
            .hide-mobile { display: none !important; }
        }
    </style>
</head>

    <!-- Core Javascript -->
    <script>
        // Basic protection scripts
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        };

        const API_BASE = 'https://streamed.pk/api';
        let currentCategoryMatches = []; 
        let globalAllMatches = []; 

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const themeBtn = document.getElementById('theme-toggle');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                themeBtn.innerText = '🌙';
            }

            loadSports();
            fetchMatches('live'); 
            fetchGlobalMatches(); 
            generateLongAboutText(); 

            document.getElementById('sport-selector').addEventListener('change', (e) => {
                document.getElementById('search-input').value = ''; 
                document.getElementById('current-category').innerText = e.target.options[e.target.selectedIndex].text;
                fetchMatches(e.target.value);
            });

            document.getElementById('search-input').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                if(!searchTerm) { 
                    document.getElementById('current-category').innerText = "Live Matches";
                    displayMatches(currentCategoryMatches); 
                    return; 
                }
                
                document.getElementById('current-category').innerText = `Search Results: "${searchTerm}"`;
                const filtered = globalAllMatches.filter(match => {
                    const title = match.title ? match.title.toLowerCase() : '';
                    const hTeam = match.teams?.home?.name ? match.teams.home.name.toLowerCase() : '';
                    const aTeam = match.teams?.away?.name ? match.teams.away.name.toLowerCase() : '';
                    const cat = match.category ? match.category.toLowerCase() : '';
                    return title.includes(searchTerm) || hTeam.includes(searchTerm) || aTeam.includes(searchTerm) || cat.includes(searchTerm);
                });
                displayMatches(filtered);
            });

            setInterval(updateCountdowns, 1000);
        });

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-toggle');
            body.classList.toggle('light-theme');
            
            if (body.classList.contains('light-theme')) {
                localStorage.setItem('theme', 'light');
                themeBtn.innerText = '🌙';
            } else {
                localStorage.setItem('theme', 'dark');
                themeBtn.innerText = '☀️';
            }
        }

        async function fetchGlobalMatches() {
            try {
                const response = await fetch(`${API_BASE}/matches/all`);
                globalAllMatches = await response.json();
            } catch (error) { console.log("Global fetch failed."); }
        }

        function resetToHome() {
            document.getElementById('search-input').value = '';
            document.getElementById('about-page').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('sport-selector').value = 'live';
            document.getElementById('current-category').innerText = 'Live Matches';
            closePlayer();
            fetchMatches('live');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showAboutPage() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('about-page').style.display = 'block';
            closePlayer();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Formatted and SEO Optimized About Section with API Disclaimer
        function generateLongAboutText() {
            const aboutHTML = `
                <div style="margin-bottom: 25px;">
                    <h3 style="color: var(--text-light); margin-bottom: 10px; font-size: 20px; font-weight:800; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">About RK LIVED - Your Ultimate Sports Portal</h3>
                    <p style="margin-bottom: 15px; color: var(--text-muted); font-size: 15px; line-height: 1.8;">Welcome to <strong>RK LIVED</strong>, the premier destination for live sports enthusiasts. Our platform is dedicated to providing high-quality, buffer-free live streaming for <strong>Football, Cricket, Basketball, Tennis</strong>, and other global sporting events. Whether you are looking for today's live match, ICC Cricket Tournaments, IPL, BPL, English Premier League (EPL), La Liga, or the UEFA Champions League, RK LIVED brings HD sports directly to your screen completely free.</p>
                </div>
                
                <div style="margin-bottom: 25px; padding: 15px; background: rgba(211, 47, 47, 0.05); border-left: 4px solid var(--primary); border-radius: 4px;">
                    <h3 style="color: var(--primary); margin-bottom: 10px; font-size: 16px;">⚠️ Disclaimer & API Usage (Copyright Notice)</h3>
                    <p style="font-size: 14.5px; color: var(--text-muted); line-height: 1.6;">
                        <strong>RK LIVED acts strictly as a sports aggregator and embedding portal.</strong> We do not host, upload, broadcast, or manage any video content or media files on our own servers. 
                        All live streams and video players displayed on this website are provided through <strong>Third-Party APIs</strong> and external web servers available publicly on the internet. 
                        We simply index and embed these links for the convenience of sports fans. Therefore, RK LIVED holds no liability for the media content. Any copyright infringement issues or DMCA takedown requests should be directed to the respective third-party video hosting providers.
                    </p>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: var(--text-light); margin-bottom: 10px; font-size: 18px;">Why Choose RK LIVED?</h3>
                    <ul style="list-style-type: none; padding: 0; color: var(--text-muted); line-height: 1.8; font-size: 15px;">
                        <li>✅ <strong>100% Free Access:</strong> Enjoy premium sports content without any hidden subscriptions.</li>
                        <li>✅ <strong>Multi-Device Optimization:</strong> Watch seamlessly on Mobile Phones, Tablets, PCs, and Smart TVs.</li>
                        <li>✅ <strong>High-Speed Servers:</strong> Multiple secure server options to ensure a buffer-free viewing experience.</li>
                        <li>✅ <strong>Real-Time Updates:</strong> Instant countdowns and live match status adjusted to Bangladesh Time (BD Time).</li>
                    </ul>
                </div>
                
                <p style="margin-top: 20px; font-style: italic; color: #64748b; font-size: 14px;">
                    Thank you for choosing RK LIVED. Bookmark our website (rklived.vercel.app) to never miss a moment of your favorite live matches!
                </p>
            `;
            document.getElementById('long-about-text').innerHTML = aboutHTML;
        }

        function updateCountdowns() {
            const timerElements = document.querySelectorAll('.countdown-timer-box');
            const now = Date.now();
            timerElements.forEach(el => {
                const targetTime = parseInt(el.getAttribute('data-time'));
                const diff = targetTime - now;
                if (diff > 0) {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    let timeStr = '⏳ Starts in: ';
                    if (d > 0) timeStr += `${d}d `;
                    timeStr += `${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
                    el.innerText = timeStr; 
                    el.style.color = document.body.classList.contains('light-theme') ? '#d97706' : '#f59e0b';
                } else {
                    el.innerText = '🔴 LIVE NOW'; 
                    el.style.color = '#d32f2f'; 
                    el.style.borderColor = 'rgba(211, 47, 47, 0.4)';
                    el.style.backgroundColor = 'rgba(211, 47, 47, 0.1)';
                }
            });
        }

        async function loadSports() {
            try {
                const response = await fetch(`${API_BASE}/sports`);
                const sports = await response.json();
                const selector = document.getElementById('sport-selector');
                sports.forEach(sport => {
                    const option = document.createElement('option');
                    option.value = sport.id; option.textContent = sport.name;
                    selector.appendChild(option);
                });
            } catch (error) {}
        }

        async function fetchMatches(endpoint) {
            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '<div class="loader">Loading Match Data...</div>';
            try {
                const response = await fetch(`${API_BASE}/matches/${endpoint}`);
                const matches = await response.json();
                currentCategoryMatches = matches; 
                displayMatches(matches);
                updateCountdowns(); 
            } catch (error) { grid.innerHTML = '<div class="loader">Failed to connect to server.</div>'; }
        }

        function displayMatches(matches) {
            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '';

            if (matches.length === 0) {
                grid.innerHTML = '<div class="loader">No live matches available at the moment.</div>';
                return;
            }

            matches.forEach(match => {
                const matchDate = new Date(match.date);
                const timeString = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Dhaka', hour: 'numeric', minute: 'numeric', hour12: true }).format(matchDate);
                const dateString = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Dhaka', day: 'numeric', month: 'short', year: 'numeric' }).format(matchDate);

                let posterStyle = '';
                let defaultTextHTML = '';

                if (match.poster && !match.poster.includes('default')) {
                    posterStyle = `background-image: url('https://streamed.pk${match.poster}.webp');`;
                } else if (match.teams?.home?.badge && match.teams?.away?.badge) {
                    posterStyle = `background-image: url('${API_BASE}/images/poster/${match.teams.home.badge}/${match.teams.away.badge}.webp');`;
                } else {
                    posterStyle = `background: var(--bg-dark);`;
                    defaultTextHTML = `<div class="default-logo-text">SPORTS</div>`;
                }
                
                const hasStreams = match.sources && match.sources.length > 0;

                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="poster-area" style="${posterStyle}">
                        ${defaultTextHTML}
                        <div class="time-badge">${timeString}</div>
                    </div>
                    
                    <div class="match-info">
                        <div class="match-category">${match.category}</div>
                        <div class="match-title">${match.title}</div>
                        <div class="match-date">📅 ${dateString}, ${timeString} (Bangladesh Time)</div>
                        <div class="countdown-timer-box" data-time="${match.date}">⏳ Calculating...</div>
                        
                        <button class="btn-modern" ${!hasStreams ? 'disabled' : ''} 
                            onclick='getStreams(${JSON.stringify(match.sources)}, "${match.title.replace(/'/g, "\\'")}")'>
                            ${hasStreams ? 'Watch Live HD' : 'Stream Not Available'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function getStreams(sources, matchTitle) {
            if (!sources || sources.length === 0) return;
            const source = sources[0];
            const modal = document.getElementById('stream-modal');
            const container = document.getElementById('stream-options-container');
            
            container.innerHTML = '<div class="loader">Fetching secure servers...</div>';
            modal.style.display = 'flex';

            try {
                const response = await fetch(`${API_BASE}/stream/${source.source}/${source.id}`);
                const streams = await response.json();
                if (streams.length === 0) { container.innerHTML = '<div class="loader">No active servers found.</div>'; return; }

                container.innerHTML = '';
                streams.forEach(stream => {
                    const btn = document.createElement('button');
                    btn.className = 'stream-option';
                    btn.innerHTML = `Server ${stream.streamNo} - ${stream.language} ${stream.hd ? '<span class="hd-badge">HD</span>' : ''}`;
                    btn.onclick = () => playVideo(stream.embedUrl, matchTitle);
                    container.appendChild(btn);
                });
            } catch (error) { container.innerHTML = '<div class="loader">Network Error.</div>'; }
        }

        function playVideo(embedUrl, matchTitle) {
            closeModal();
            const playerWrapper = document.getElementById('player-wrapper');
            const iframe = document.getElementById('video-frame');
            const preRoll = document.getElementById('pre-roll');

            document.title = `LIVE: ${matchTitle} - RK LIVED`;
            playerWrapper.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            preRoll.style.display = 'flex'; iframe.style.display = 'none'; iframe.src = ''; 
            setTimeout(() => { preRoll.style.display = 'none'; iframe.style.display = 'block'; iframe.src = embedUrl; }, 2000);
        }

        function closePlayer() {
            document.getElementById('player-wrapper').style.display = 'none';
            document.getElementById('video-frame').src = ''; 
            document.title = "RK LIVED - Premium Live Sports, Football & Cricket HD Free"; 
        }

        function closeModal() { document.getElementById('stream-modal').style.display = 'none'; }
    </script>
</body>
</html>
